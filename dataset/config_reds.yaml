dataset:
  train:
    dataroot_gt: data/REDSStablevsr/train_sharp/ # path to GT (e.g., 000, 001, 002 ... )
    dataroot_lq: data/REDSStablevsr/train_sharp_bicubic/X4/ # path to bicubic (e.g., 000, 001, 002 ... )
    meta_info_file: data/REDSStablevsr/meta_info_official_train.txt
    dataroot_flow:
    io_backend:
      type: disk
    num_frame: 3
    val_partition: 'REDS4'
    test_mode: False
    interval_list: [1]
    random_reverse: False
    gt_size: 256
    use_hflip: True
    use_rot: False
    scale: 4
    remove_partition: True
  test:
    dataroot_gt: data/REDSStablevsr/val_sharp/
    dataroot_lq: data/REDSStablevsr/val_sharp_bicubic/X4/
    meta_info_file: data/REDSStablevsr/meta_info_official_val.txt
    io_backend:
      type: disk
    num_frame: 3
    val_partition: 'REDS4'
    test_mode: True
    interval_list: [1]
    random_reverse: False
    gt_size: 256
    use_hflip: False
    use_rot: False
    scale: 4